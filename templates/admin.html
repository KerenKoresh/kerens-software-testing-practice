<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage · ToolShop</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="bar">
    <h1><a href="/">🛠️ ToolShop</a></h1>
    <nav class="menu">
      <a class="admin-link" href="/docs">API Docs</a>
      <a class="admin-link" href="/">← Back to shop</a>
    </nav>
  </header>

  <div class="container">
    <div id="toast" class="message toast hidden"></div>
    <p class="muted">When you create a product you become its owner (an edit token is saved
      in this browser). Only the owner can edit or delete it.</p>

    <div class="admin-grid">
      <div class="panel">
        <h2 id="formTitle">Add product</h2>
        <form id="productForm">
          <input type="hidden" id="productId">
          <div class="field">
            <label for="name">Name *</label>
            <input type="text" id="name" required>
          </div>
          <div class="field">
            <label for="category">Category</label>
            <input type="text" id="category">
          </div>
          <div class="field">
            <label for="price">Price</label>
            <input type="number" id="price" step="0.01" min="0" value="0">
          </div>
          <div class="field">
            <label for="description">Description</label>
            <textarea id="description" rows="3"></textarea>
          </div>
          <div class="field check">
            <input type="checkbox" id="in_stock" checked>
            <label for="in_stock" style="margin:0">In stock</label>
          </div>
          <button type="submit" class="btn btn-primary" id="submitBtn">Add product</button>
          <button type="button" class="btn btn-ghost hidden" id="cancelBtn">Cancel</button>
        </form>
      </div>

      <div class="panel">
        <h2>All products</h2>
        <table class="admin-table">
          <thead>
            <tr><th>ID</th><th>Name</th><th>Price</th><th>Stock</th><th></th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='products.js') }}"></script>
  <script>
    const form = document.getElementById('productForm');
    const tbody = document.getElementById('tbody');
    const toast = document.getElementById('toast');
    const formTitle = document.getElementById('formTitle');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');

    const f = {
      id: document.getElementById('productId'),
      name: document.getElementById('name'),
      category: document.getElementById('category'),
      price: document.getElementById('price'),
      description: document.getElementById('description'),
      in_stock: document.getElementById('in_stock'),
    };

    function showToast(text, type) {
      toast.textContent = text;
      toast.className = 'message toast ' + type;
      setTimeout(() => { toast.className = 'message toast hidden'; }, 3000);
    }

    async function loadTable() {
      const res = await fetch('/api/products');
      const data = await res.json();
      tbody.innerHTML = '';
      data.forEach(p => {
        const mine = ownsProduct(p.id);
        const actions = mine
          ? `<div class="row-actions">
               <button class="btn btn-ghost btn-sm" data-edit="${p.id}">Edit</button>
               <button class="btn btn-danger btn-sm" data-del="${p.id}">Delete</button>
             </div>`
          : `<span class="muted" title="Created by someone else">🔒</span>`;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${p.id}</td>
          <td>${escapeHtml(p.name)}${mine ? ' <span class="badge">yours</span>' : ''}</td>
          <td>$${Number(p.price).toFixed(2)}</td>
          <td class="${p.in_stock ? 'in' : 'out'}">${p.in_stock ? 'Yes' : 'No'}</td>
          <td>${actions}</td>`;
        tbody.appendChild(tr);
      });
    }

    function resetForm() {
      form.reset();
      f.id.value = '';
      f.in_stock.checked = true;
      formTitle.textContent = 'Add product';
      submitBtn.textContent = 'Add product';
      cancelBtn.classList.add('hidden');
    }

    function fillForm(p) {
      f.id.value = p.id;
      f.name.value = p.name;
      f.category.value = p.category || '';
      f.price.value = p.price;
      f.description.value = p.description || '';
      f.in_stock.checked = !!p.in_stock;
      formTitle.textContent = 'Edit product #' + p.id;
      submitBtn.textContent = 'Save changes';
      cancelBtn.classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Create (POST) or update (PUT)
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const payload = {
        name: f.name.value.trim(),
        category: f.category.value.trim(),
        price: parseFloat(f.price.value) || 0,
        description: f.description.value.trim(),
        in_stock: f.in_stock.checked,
      };
      const id = f.id.value;

      try {
        let res, data;
        if (id) {
          res = await fetch('/api/products/' + id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Edit-Token': getToken(id) || '' },
            body: JSON.stringify(payload),
          });
        } else {
          res = await fetch('/api/products', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
        }
        data = await res.json();
        if (!res.ok) { showToast(data.error || 'Error saving product', 'error'); return; }

        if (!id && data.edit_token) saveToken(data.id, data.edit_token); // become owner
        showToast(id ? 'Product updated.' : 'Product created — you are the owner.', 'info');
        resetForm();
        loadTable();
      } catch (err) {
        showToast('Network error. Please try again.', 'error');
      }
    });

    cancelBtn.addEventListener('click', resetForm);

    // Edit / delete (only rendered for owned products)
    tbody.addEventListener('click', async e => {
      const editId = e.target.getAttribute('data-edit');
      const delId = e.target.getAttribute('data-del');

      if (editId) {
        const res = await fetch('/api/products/' + editId);
        const data = await res.json();
        if (res.ok) fillForm(data);
        else showToast(data.error || 'Not found', 'error');
      }

      if (delId) {
        if (!confirm('Delete product #' + delId + '?')) return;
        const res = await fetch('/api/products/' + delId, {
          method: 'DELETE',
          headers: { 'X-Edit-Token': getToken(delId) || '' },
        });
        const data = await res.json();
        if (!res.ok) { showToast(data.error || 'Error deleting', 'error'); return; }
        removeToken(delId);
        showToast('Product deleted.', 'info');
        if (f.id.value === delId) resetForm();
        loadTable();
      }
    });

    loadTable();
  </script>
</body>
</html>
