<!DOCTYPE HTML>
<!-- Design: Dopetrope by HTML5 UP (html5up.net) — CCA 3.0 license -->
<html>
<head>
  <title>Product · ToolShop</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="{{ url_for('static', filename='theme/assets/css/main.css') }}" />
  <style>
    .price-tag { font-weight: 900; font-size: 2em; }
    .stock-in { color: #5fd36b; font-weight: 700; }
    .stock-out { color: #ff6b6b; font-weight: 700; }
    .detail-img img { width: 100%; height: 320px; object-fit: cover; }
    .msg.error { color: #ff6b6b; }
  </style>
</head>
<body class="is-preload">
  <div id="page-wrapper">

    <section id="header">
      <h1><a href="/">🛠️ ToolShop</a></h1>
      <nav id="nav">
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/docs">API Docs</a></li>
        </ul>
      </nav>
    </section>

    <section id="main">
      <div class="container">
        <div class="row">
          <div class="col-12">
            <p><a href="/">&larr; Back to shop</a></p>
            <div id="content"></div>
          </div>
        </div>
      </div>
    </section>

    <div id="copyright">
      <ul class="menu">
        <li>&copy; ToolShop</li>
        <li>Design: <a href="https://html5up.net">HTML5 UP</a></li>
      </ul>
    </div>

  </div>

  <script src="{{ url_for('static', filename='theme/assets/js/jquery.min.js') }}"></script>
  <script src="{{ url_for('static', filename='theme/assets/js/browser.min.js') }}"></script>
  <script src="{{ url_for('static', filename='theme/assets/js/breakpoints.min.js') }}"></script>
  <script src="{{ url_for('static', filename='theme/assets/js/util.js') }}"></script>
  <script src="{{ url_for('static', filename='theme/assets/js/main.js') }}"></script>

  <script>
    const productId = {{ product_id }};
    const content = document.getElementById('content');
    const IMG = "{{ url_for('static', filename='theme/images/pic02.jpg') }}";

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function loadProduct() {
      try {
        const res = await fetch('/api/products/' + productId);
        const data = await res.json();
        if (!res.ok) {
          content.innerHTML = '<section class="box"><p class="msg error">' +
            escapeHtml(data.error || 'Product not found') + '</p></section>';
          document.title = 'Not found · ToolShop';
          return;
        }
        document.title = data.name + ' · ToolShop';
        content.innerHTML = `
          <div class="row">
            <div class="col-6 col-12-medium">
              <span class="image featured detail-img"><img src="${IMG}" alt="" /></span>
            </div>
            <div class="col-6 col-12-medium">
              <header class="major"><h2>${escapeHtml(data.name)}</h2></header>
              <p class="price-tag">$${Number(data.price).toFixed(2)}</p>
              <p>${escapeHtml(data.description || 'No description.')}</p>
              <ul class="divided">
                <li><strong>ID:</strong> ${data.id}</li>
                <li><strong>Category:</strong> ${escapeHtml(data.category || 'Uncategorized')}</li>
                <li><strong>Availability:</strong>
                  <span class="${data.in_stock ? 'stock-in' : 'stock-out'}">
                    ${data.in_stock ? 'In stock' : 'Out of stock'}</span>
                </li>
              </ul>
            </div>
          </div>`;
      } catch (e) {
        content.innerHTML = '<section class="box"><p class="msg error">Network error. Please try again.</p></section>';
      }
    }
    loadProduct();
  </script>
</body>
</html>
