<!DOCTYPE HTML>
<!-- Design: Dopetrope by HTML5 UP (html5up.net) — CCA 3.0 license -->
<html>
<head>
  <title>API Docs · ToolShop</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="{{ url_for('static', filename='theme/assets/css/main.css') }}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.17.14/swagger-ui.min.css">
  <style>
    #swagger-wrap { background: #fff; border-radius: 6px; padding: 0.5em 1em; margin-bottom: 3em; }
    .swagger-ui .topbar { display: none; }
  </style>
</head>
<body class="is-preload">
  <div id="page-wrapper">

    <section id="header">
      <h1><a href="/">🛠️ ToolShop</a></h1>
      <nav id="nav">
        <ul>
          <li><a href="/">Home</a></li>
          <li class="current"><a href="/docs">API Docs</a></li>
        </ul>
      </nav>
      <section id="banner">
        <header>
          <h2>API Reference</h2>
          <p>Interactive docs &mdash; click an endpoint, then <strong>Try it out</strong></p>
        </header>
      </section>
    </section>

    <section id="main">
      <div class="container">
        <div class="row">
          <div class="col-12">
            <div id="swagger-wrap"><div id="swagger-ui"></div></div>
          </div>
        </div>
      </div>
    </section>

    <div id="copyright">
      <ul class="menu">
        <li>&copy; ToolShop</li>
        <li>Design: <a href="https://html5up.net">HTML5 UP</a></li>
      </ul>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.17.14/swagger-ui-bundle.min.js"></script>
  <script>
    window.onload = () => {
      SwaggerUIBundle({
        url: '/api/openapi.json',
        dom_id: '#swagger-ui',
        deepLinking: true,
        tryItOutEnabled: true,
        defaultModelsExpandDepth: -1,
      });
    };
  </script>
</body>
</html>
